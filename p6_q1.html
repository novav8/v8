          <h2>Q.1 Implement bubble sort algorithm</h2>
<textarea id="code1" rows="10" cols="80">
arr = [5, 3, 8, 6, 2]

n = len(arr)

for i in range(n):
    for j in range(0, n - i - 1):
        if arr[j] > arr[j + 1]:
            arr[j], arr[j + 1] = arr[j + 1], arr[j]

print("Sorted list:", arr)</textarea>
<button onclick="copyCode('code1', this)">Copy</button>

        <h2>Q.2 Implement selection sort algorithm.</h2>

<textarea id="code2"  rows="10" cols="80">
arr = [5, 3, 8, 6, 2]

n = len(arr)

for i in range(n):
    min_index = i
    for j in range(i + 1, n):
        if arr[j] < arr[min_index]:
            min_index = j
    arr[i], arr[min_index] = arr[min_index], arr[i]

print("Sorted list:", arr)</textarea>
<button onclick="copyCode('code2', this)">Copy</button>

        <h2>Q.3 Implement insertion sort algorithm</h2>
<textarea id="code3"  rows="10" cols="80">
arr = [5, 3, 8, 6, 2]

for i in range(1, len(arr)):
    key = arr[i]
    j = i - 1
    while j >= 0 and key < arr[j]:
        arr[j + 1] = arr[j]
        j -= 1
    arr[j + 1] = key

print("Sorted list:", arr)</textarea>
<button onclick="copyCode('code3', this)">Copy</button>
