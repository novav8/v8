<body>

   <h2>a) Create BEFORE INSERT and AFTER UPDATE triggers on a table. </h2>

<textarea id="codeBox" rows="10" cols="80">
CREATE TABLE employee_trg (
    emp_id NUMBER,
    emp_name VARCHAR2(50),
    salary NUMBER
);
CREATE OR REPLACE TRIGGER trg_before_insert
BEFORE INSERT ON employee_trg
FOR EACH ROW
BEGIN
    DBMS_OUTPUT.PUT_LINE('Before Insert Trigger Executed');
END;
/
CREATE OR REPLACE TRIGGER trg_after_update
AFTER UPDATE ON employee_trg
FOR EACH ROW
BEGIN
    DBMS_OUTPUT.PUT_LINE('After Update Trigger Executed');
END;
/
SET SERVEROUTPUT ON;

INSERT INTO employee_trg VALUES (1,'Shreya',40000);

UPDATE employee_trg
SET salary = 45000
WHERE emp_id = 1;</textarea>

<br><br>

<button id="copyBtn" onclick="copyCode()">📋 Copy Code</button>

<script>
function copyCode() {
  let text = document.getElementById("codeBox").value;
  let btn = document.getElementById("copyBtn");

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied!";
  
  setTimeout(() => {
    btn.innerText = "📋 Copy Code";
  }, 2000);
}
</script>
