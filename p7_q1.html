          <h2>Aim: Function Overloading and Overriding: a. Develop programs to demonstrate function overloading and overriding within classes.</h2>
<textarea id="code1" rows="10" cols="80">
#include <iostream.h>
#include <conio.h>

// Base class
class base
{
public:
    // Function Overloading
    void show()
    {
        cout << "Function with no argument" << endl;
    }

    void show(int x)
    {
        cout << "Function with one argument: " << x << endl;
    }

    // Function to be overridden
    void display()
    {
        cout << "Display from Base class" << endl;
    }
};

// Derived class
class derived : public base
{
public:
    // Function Overriding
    void display()
    {
        cout << "Display from Derived class" << endl;
    }
};

void main()
{
    clrscr();

    base b;
    derived d;

    // Function Overloading
    b.show();
    b.show(10);

    // Function Overriding
    d.display();

    getch();
}
</textarea>

           <h2>Q.2 Implement recursive algorithm e.g., Fibonacci</h2>

<textarea id="code2"rows="10" cols="80">
def fibonacci(n):
    if n <= 1:   # Base case
        return n
    else:
        return fibonacci(n - 1) + fibonacci(n - 2)

num = int(input("Enter number of terms: "))

print("Fibonacci series:")
for i in range(num):
    print(fibonacci(i), end=" ")</textarea>
