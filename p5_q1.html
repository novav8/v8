<!DOCTYPE html>
<html>
<head>
    <title>Practical Page</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 40px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 700px;
        }

        h1 {
            margin-bottom: 20px;
        }

        img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .back-btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

    <h2> A) Declare and initialize variables of types NUMBER, VARCHAR2, and DATE, and display them</h2>

<textarea id="code1" rows="10" cols="80">
DECLARE
    v_number NUMBER := 100;
    v_text VARCHAR2(50) := 'Hello PL/SQL';
    v_date DATE := SYSDATE;

BEGIN
    DBMS_OUTPUT.PUT_LINE('Number value: ' || v_number);
    DBMS_OUTPUT.PUT_LINE('Text value: ' || v_text);
    DBMS_OUTPUT.PUT_LINE('Date value: ' || TO_CHAR(v_date, 'DD-MON-YYYY'));
END;
/
</textarea>
<button onclick="copyCode('code1', this)">Copy</button>

<br><br>
<h2>B) Arithmetic expressions and string concatenation using variable in PL/SQL and SQL</h2>
<textarea id="code2" rows="10" cols="80">
DECLARE
    a NUMBER := 10;
    b NUMBER := 5;
    sum_result NUMBER;
    full_name VARCHAR2(50);

BEGIN
    -- Arithmetic operation
    sum_result := a + b;

    -- String concatenation
    full_name := 'Santosh' || ' ' || 'Pable';

    DBMS_OUTPUT.PUT_LINE('Sum is: ' || sum_result);
    DBMS_OUTPUT.PUT_LINE('Full Name: ' || full_name);
END;
/
 </textarea>
<button onclick="copyCode('code2', this)">Copy</button>
    <br><br>
    <h2>C) Use program to handle and display errors when dividing by zero</h2>
    <textarea id="code2" rows="10" cols="80">
        DECLARE
    a NUMBER := 10;
    b NUMBER := 0;
    result NUMBER;

BEGIN
    result := a / b; -- This will cause division by zero

    DBMS_OUTPUT.PUT_LINE('Result: ' || result);

EXCEPTION
    WHEN ZERO_DIVIDE THEN
        DBMS_OUTPUT.PUT_LINE('Error: Division by zero is not allowed.');
    WHEN OTHERS THEN
        DBMS_OUTPUT.PUT_LINE('Unexpected error occurred.');
END;
/
    </textarea>
<button onclick="copyCode('code2', this)">Copy</button>

<script>
function copyCode(id, btn) {
  let text = document.getElementById(id).value;

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied!";
  
  setTimeout(() => {
    btn.innerText = "📋 Copy";
  }, 2000);
}
</script>

</html>
