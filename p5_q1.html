    <h2> a) Create a simple class with data members and member functions.</h2>

<textarea id="code1" rows="10" cols="80">
#include <iostream.h>
#include <string.h>
#include <conio.h>

class student
{
    char name[20];
    int age;

public:
    void setdata()
    {
        strcpy(name, "alice");
        age = 20;
    }

    void displaydata()
    {
        cout << "Name: " << name << endl;
        cout << "Age: " << age << endl;
    }
};

void main()
{
    clrscr();
    student s;
    s.setdata();
    s.displaydata();
    getch();
}     
</textarea>
<button onclick="copyCode('code1', this)">Copy</button>

<h2>b) Demonstrate the use of class instances to access data and invoke member functions.</h2>
<textarea id="code2" rows="10" cols="80">
#include <iostream.h>
#include <conio.h>

class car
{
    int speed;

public:
    void setspeed()
    {
        speed = 60;
    }

    void showspeed()
    {
        cout << "Car speed: " << speed << " km/h" << endl;
    }
};

void main()
{
    clrscr();

    car c1;
    c1.setspeed();
    c1.showspeed();

    getch();
}
</textarea>
<button onclick="copyCode('code2', this)">Copy</button>

<script>
function copyCode(id, btn) {
  let text = document.getElementById(id).value;

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied!";
  
  setTimeout(() => {
    btn.innerText = "📋 Copy";
  }, 2000);
}
</script>
