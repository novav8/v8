    <h2>Q. Implement linear algorithm on a list.</h2>

<textarea id="code1" rows="10" cols="80">
# Array Definition
arr = [5, 2, 9, 1, 7, 6]
print("Array:", arr)
# Element to search
x = 7
print("Searching for:", x)
# Linear Search
def linear_search(arr, x):
    for i in range(len(arr)):
        if arr[i] == x:
            return i  # Return index if found
    return -1     # Return -1 if not found

index = linear_search(arr, x)

if index != -1:
    print(f"Element {x} found at index {index}")
else:
    print(f"Element {x} not found in the array")    
</textarea>

<h2>Q. Implement binary search algorithm on a list.</h2>
<textarea id="code2" rows="10" cols="80">
# Array Definition (sorted)
arr = [1, 2, 5, 6, 7, 9]
print("Sorted Array:", arr)

# Element to search
x = 9
print("Searching for:", x)

# Binary Search
def binary_search(arr, x):
    low = 0
    high = len(arr) - 1

    while low <= high:
        mid = (low + high) // 2
        if arr[mid] == x:
            return mid
        elif arr[mid] < x:
            low = mid + 1
        else:
            high = mid - 1
    return -1

index = binary_search(arr, x)

if index != -1:
    print(f"Element {x} found at index {index}")
else:
    print(f"Element {x} not found in the array")</textarea>
