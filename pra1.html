<!DOCTYPE html>
<html>
<head>
    <title>Practical Page</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 40px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 700px;
        }

        h1 {
            margin-bottom: 20px;
        }

        img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .back-btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

    <div class="container">
        

      
  <h2> a) Use Native Dynamic SQL (EXECUTE IMMEDIATE) to create a table at runtime.
</h2>

<textarea id="codeBox" rows="10" cols="80">
DECLARE
    v_sql VARCHAR2(200);
BEGIN
    -- SQL statement to create table
    v_sql := 'CREATE TABLE student_dynamic (
                student_id NUMBER,
                student_name VARCHAR2(50),
                marks NUMBER
              )';

    -- Execute dynamic SQL
    EXECUTE IMMEDIATE v_sql;

    DBMS_OUTPUT.PUT_LINE('Table created successfully.');

EXCEPTION
    WHEN OTHERS THEN
        DBMS_OUTPUT.PUT_LINE('Error: ' || SQLERRM);
END;
/
</textarea>

<br><br>

<button id="copyBtn" onclick="copyCode()">📋 Copy Code</button>

<script>
function copyCode() {
  let text = document.getElementById("codeBox").value;
  let btn = document.getElementById("copyBtn");

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied!";
  
  setTimeout(() => {
    btn.innerText = "📋 Copy Code";
  }, 2000);
}
</script>
     <br> <br>
          <a href="index.html" class="back-btn">⬅ Back to Home</a>
    </div>

</body>
</html>
