<!DOCTYPE html>
<html>
<head>
    <title>Practical Page</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 40px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 700px;
        }

        h1 {
            margin-bottom: 20px;

            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .back-btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

    <div class="container">
         <h2>Use a record variable in a loop to display data from a table.</h2>
<textarea id="code1"rows="10" cols="80">CREATE TABLE employee (
    emp_id   NUMBER,
    emp_name VARCHAR2(50),
    salary   NUMBER(10,2)
);

INSERT INTO employee VALUES (101, 'Alice', 45000);
INSERT INTO employee VALUES (102, 'Bob', 55000);
INSERT INTO employee VALUES (103, 'Charlie', 60000);

COMMIT;

 
SET SERVEROUTPUT ON;

DECLARE
    CURSOR emp_cursor IS 
        SELECT emp_id, emp_name, salary FROM employee;

BEGIN
    FOR emp_rec IN emp_cursor LOOP
        DBMS_OUTPUT.PUT_LINE('ID: ' || emp_rec.emp_id ||
                             ', Name: ' || emp_rec.emp_name ||
                             ', Salary: ' || emp_rec.salary);
    END LOOP;
END;
/</textarea>
<button onclick="copyCode('code1', this)">Copy</button>

<br><br>
<h2>Create a table of records using nested collections</h2>
<textarea id="code2"rows="10" cols="80">   DECLARE
    -- Define record type
    TYPE emp_record IS RECORD (
        emp_id   NUMBER,
        emp_name VARCHAR2(50),
        salary   NUMBER(10,2)
    );

    -- Define table type (nested collection) of records
    TYPE emp_table IS TABLE OF emp_record;

    emp_list emp_table := emp_table();  -- Initialize collection

BEGIN
    -- Add records to collection
    emp_list.EXTEND;
    emp_list(1).emp_id := 101;
    emp_list(1).emp_name := 'Alice';
    emp_list(1).salary := 45000;

    emp_list.EXTEND;
    emp_list(2).emp_id := 102;
    emp_list(2).emp_name := 'Bob';
    emp_list(2).salary := 55000;

    -- Display records
    FOR i IN 1 .. emp_list.COUNT LOOP
        DBMS_OUTPUT.PUT_LINE('ID: ' || emp_list(i).emp_id ||
                             ', Name: ' || emp_list(i).emp_name ||
                             ', Salary: ' || emp_list(i).salary);
    END LOOP;
END;
/</textarea>
<button onclick="copyCode('code2', this)">Copy</button>
      
<script>
function copyCode(id, btn) {
  let text = document.getElementById(id).value;

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied!";
  
  setTimeout(() => {
    btn.innerText = "📋 Copy";
  }, 2000);
}
</script>
