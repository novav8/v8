         <h2>Aim: Advanced Concepts: a. Implement programs showcasing friend functions, inline functions, and the use of the this pointer within classes.</h2>

<textarea id="codeBox" rows="10" cols="80">
#include <iostream.h>
#include <conio.h>

class number
{
    int x, y;

public:
    void setdata(int x, int y)
    {
        this->x = x;   // using this pointer
        this->y = y;
    }

    inline void show()
    {
        cout << "Value of x: " << x << endl;
        cout << "Value of y: " << y << endl;
    }

    // friend function declaration
    friend void sum(number n);
};

// friend function definition
void sum(number n)
{
    cout << "Sum (friend function): " << n.x + n.y << endl;
}

void main()
{
    clrscr();

    number n;
    n.setdata(5, 10);

    n.show();     // inline function
    sum(n);       // friend function

    getch();
}</textarea>

<br><br>

<button id="copyBtn" onclick="copyCode()">📋 Copy Code</button>

<script>
function copyCode() {
  let text = document.getElementById("codeBox").value;
  let btn = document.getElementById("copyBtn");

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied!";
  
  setTimeout(() => {
    btn.innerText = "📋 Copy Code";
  }, 2000);
}
</script>
